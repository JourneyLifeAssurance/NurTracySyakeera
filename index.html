<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>Tracy Kho Digital Namecard</title>

  <!-- BEBAS NEUE -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

  <!-- FONT AWESOME -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      width:100%;
      overflow-x:hidden;
      background:#ececec;
      font-family:"Century Gothic", sans-serif;
    }
    

    /* =========================
       MOBILE ONLY LAYOUT
    ========================== */

    .mobile-container{
      width:100%;
      max-width:480px;
      margin:auto;
      background:#ececec;
      min-height:100vh;
      position:relative;
    }

    /* =========================
       HERO SECTION
    ========================== */

    .hero{
      width:100%;
      height:720px;
      background:#e50000;
      position:relative;
      overflow:hidden;
    }

    /* NAME */

    .name{
      position:absolute;
      top:30px;
      left:25px;
      z-index:5;
      animation:slideLeft 1s ease;
    }

    .name h1{
      font-family:'Bebas Neue', sans-serif;
      font-size:120px;

      line-height:0.8;
      color:white;
      letter-spacing:0px;
    }

    /* DESIGNATION */

    .designation{
      position:absolute;
      left:25px;
      bottom:10px;
      z-index:5;
      animation:fadeUp 1.2s ease;
    }

    .designation p{
      font-size:20px;
      color:white;
      line-height:1.45;
    }
    
    .designation{
        position:absolute;
        bottom:1;
        width:100%;
        background:rgba(216,177,40,0.75);
        padding:9px 15px;
        backdrop-filter:blur(6px);
        -webkit-backdrop-filter:blur(6px);
        z-index:10;
}

    /* AGENT CODE */

    .agent-code{
      position:absolute;
      left:25px;
      top:220px;
      font-size:23px;
      color:white;
      z-index:5;
      animation:fadeUp 1.2s ease;
    }

    /* PERSON IMAGE */

    .person{
      position:absolute;
      bottom:0;
      margin-left:auto;
      margin-right:auto;
      animation:fadeIn 1.5s ease;
    }

    .person img{
      display:block;
    }

    /* =========================
       CONTACT SECTION
    ========================== */

    .contact-section{
      width:100%;
      background:#ececec;
      padding:40px 22px 60px;
    }

    .contact-btn{
      width:100%;
      height:78px;
      background:#f00000;
      border-radius:50px;
      margin-bottom:28px;

      display:flex;
      justify-content:center;
      align-items:center;
      gap:12px;

      text-decoration:none;
      color:black;

      font-size:22px;
      font-weight:bold;

      box-shadow:0 6px 15px rgba(0,0,0,0.15);

      transition:0.3s;
    }

    .contact-btn:active{
      transform:scale(0.97);
    }

    /* SOCIAL BUTTONS */

    .social-row{
      display:flex;
      gap:18px;
      margin-bottom:45px;
    }

    .social-btn{
      flex:1;
      height:72px;

      background:#f00000;
      border-radius:50px;

      display:flex;
      justify-content:center;
      align-items:center;
      gap:10px;

      text-decoration:none;
      color:black;

      font-size:18px;
      font-weight:bold;

      box-shadow:0 6px 15px rgba(0,0,0,0.15);

      transition:0.3s;
    }

    .social-btn:active{
      transform:scale(0.97);
    }

    /* COMPANY */

    .company{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:15px;
    }

    .company img{
      width:75px;
      height:auto;
    }

    .company h2{
      font-family:'Bebas Neue', sans-serif;
      font-size:35px;
      line-height:0.9;
      color:black;
      letter-spacing:1px;
    }

    /* =========================
       ANIMATIONS
    ========================== */

    @keyframes slideLeft{
      from{
        opacity:0;
        transform:translateX(-80px);
      }
      to{
        opacity:1;
        transform:translateX(0);
      }
    }

    @keyframes fadeUp{
      from{
        opacity:0;
        transform:translateY(50px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @keyframes fadeIn{
      from{
        opacity:0;
      }
      to{
        opacity:1;
      }
    }

  </style>
</head>

<body>

  <!-- MOBILE CONTAINER -->

  <div class="mobile-container">

    <!-- HERO -->

    <section class="hero">

      <!-- NAME -->

      <div class="name">
        <h1>NUR TRACY</h1>
        <h1>SYAKEERA</h1>
      </div>
      
      <!-- AGENT CODE -->
      
      <div class="agent-code">
          (J1L00031)
          </div>


      <div class="designation">
        <p>Financial Service Provider</p>
      </div>
     

      <!-- IMAGE -->

      <div class="person">
        <img src="tracy.png" alt="Tracy Kho">
      </div>

    </section>

    <!-- CONTACT -->

    <section class="contact-section">

      <a href="tel:+6011116018393" class="contact-btn">
        <i class="fa-solid fa-phone"></i>
        CALL
      </a>

      <a href="https://wa.me/6011116018393" class="contact-btn">
        <i class="fa-brands fa-whatsapp"></i>
        WHATSAPP
      </a>

      <a href="mailto:tracykho9765@prupartner.com.my" class="contact-btn">
        <i class="fa-solid fa-envelope"></i>
        EMAIL
      </a>

      <!-- SOCIAL -->

      <div class="social-row">

     <a href="https://www.facebook.com/tracykho1983/" class="social-btn">
          <i class="fa-brands fa-facebook"></i>
          FACEBOOK
        </a>

        <a href="https://instagram.com/tracykho030183" class="social-btn">
          <i class="fa-brands fa-instagram"></i>
          INSTAGRAM
        </a>

      </div>

      <!-- COMPANY -->

<div class="company">

  <img src="logo.png" alt="Journey Life Assurance">

  <div class="company-text">

    <h2>
      JOURNEY LIFE ASSURANCE
    </h2>

    <p class="small-company-name">
      Prudential Assurance Malaysia Berhad
    </p>

  </div>

</div>

</body>
</html>
